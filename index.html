<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>الدستور واللائحة الداخلية الكاملة</title>
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #f4f4f4; padding: 20px; line-height: 1.8; color: #333; }
        .container { max-width: 900px; margin: auto; background: white; padding: 40px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .header { text-align: center; border-bottom: 3px solid #003366; margin-bottom: 40px; padding-bottom: 20px; }
        .logos { display: flex; justify-content: center; gap: 20px; margin-bottom: 20px; flex-wrap: wrap; }
        /* تصحيح لتظهر الصور بشكل دائري واحترافي */
        .logos img { width: 140px; height: 140px; object-fit: cover; border-radius: 50%; border: 3px solid #003366; padding: 5px; background: white; }
        .chapter-title { background: #003366; color: white; padding: 15px; border-radius: 8px; margin: 30px 0 20px 0; text-align: center; font-weight: bold; }
        .madda-card { background: #fff; border: 1px solid #ddd; border-right: 6px solid #003366; margin-bottom: 15px; padding: 15px; border-radius: 8px; }
        .madda-title { font-weight: bold; color: #003366; display: block; margin-bottom: 5px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="logos">
            <img src="IMG-20260520-WA0020.jpg" alt="جامعة البحر الأحمر">
            <img src="IMG-20260520-WA0021.jpg" alt="كلية العلوم التطبيقية">
            <img src="IMG-20260520-WA0022.jpg" alt="مبادرة تأهيل مركز الأبحاث">
        </div>
        <h1>جامعة البحر الأحمر - كلية العلوم التطبيقية</h1>
        <h3>  تأهيل مركز الأبحاث</h3>
    </div>

    <div class="chapter-title">الفصل الأول إلى العاشر</div>
    
    <script>
        const allMaterials = [
            "المادة (1): تُسمى المبادرة 'مبادرة تأهيل مركز الأبحاث بكلية العلوم التطبيقية – جامعة البحر الأحمر'.",
            "المادة (2): شعار المبادرة: 'معاً لرفع كفاءة البحث العلمي'.",
            "المادة (3): المبادرة كيان أكاديمي تطوعي غير ربحي يعمل وفق لوائح الجامعة.",
            "المادة (4): تخضع المبادرة لإشراف عميد الكلية والمشرف الأكاديمي.",
            "المادة (5): تشمل المبادرة أقسام الكيمياء، المختبرات، الفيزياء الطبية، الإلكترونية، الرياضيات، والبيئة.",
            "المادة (6): الرؤية هي بناء بيئة بحثية تواكب المعايير العالمية.",
            "المادة (7): الرسالة هي تسخير الجهود الطلابية لتطوير المعامل.",
            "المادة (8): الأهداف: تطوير البنية التحتية، التدريب، والشراكات العلمية.",
            "المادة (9): العضوية متاحة لجميع طلاب وخريجي الكلية.",
            "المادة (10): الحقوق: المشاركة في الأنشطة والترشح للانتخابات.",
            "المادة (11): الواجبات: احترام لوائح الجامعة والمحافظة على الممتلكات.",
            "المادة (12): تُسحب العضوية في حال الإضرار بسمعة المبادرة.",
            "المادة (13): الجمعية العمومية هي السلطة العليا وتضم جميع الأعضاء.",
            "المادة (14): تختص الجمعية بانتخاب المكتب التنفيذي وإجازة الخطط.",
            "المادة (15): المجلس الاستشاري: العميد، المشرف الأكاديمي، و3 خريجين.",
            "المادة (16): يتولى المجلس التوجيه العام والفصل في النزاعات.",
            "المادة (17): المكتب التنفيذي هو الجهة الإدارية المنفذة.",
            "المادة (18): يتكون المكتب من الرئيس، نائبه، المقرر، واللجان.",
            "المادة (19): ضرورة تمثيل جميع الأقسام في المكتب التنفيذي.",
            "المادة (20): تُشكل لجنة فرعية لكل قسم تتبع المكتب التنفيذي.",
            "المادة (21): اللجان الفرعية تحصر الاحتياجات وترفع التقارير.",
            "المادة (22): مدة الدورة (12) شهراً ولا تزيد عن دورتين للرئيس.",
            "المادة (23): تُنتخب القيادة بالاقتراع المباشر من الجمعية.",
            "المادة (24): تعين لجنة مستقلة للإشراف على الانتخابات.",
            "المادة (25): يتم التسليم والتسلم للأرشيف والعهد خلال أسبوعين.",
            "المادة (26): تعتمد المبادرة على الرعايات والشراكات العلمية.",
            "المادة (27): تخضع المصروفات للرقابة المالية مع الكلية.",
            "المادة (28): تلتزم المبادرة بالشفافية المالية ونشر التقارير.",
            "المادة (29): يجب توثيق كافة الإنجازات في أرشيف ورقي ورقمي.",
            "المادة (30): تحفظ نسخة من الأرشيف لدى إدارة الكلية.",
            "المادة (31): تُسلم العهد والحسابات للمكتب الجديد عند انتهاء الدورة.",
            "المادة (32): للمجلس الاستشاري تجميد العضوية في حال المخالفات.",
            "المادة (33): يحق للجمعية سحب الثقة من أي عضو تنفيذي.",
            "المادة (34): تسعى المبادرة لإدخال الذكاء الاصطناعي في المعامل.",
            "المادة (35): لا يُعدل الدستور إلا بموافقة ثلثي الأعضاء والعميد.",
            "المادة (36): يصبح الدستور نافذاً من تاريخ توقيعه من العميد."
        ];

        allMaterials.forEach(item => {
            let parts = item.split(':');
            document.write(`<div class="madda-card"><span class="madda-title">${parts[0]}</span>${parts[1]}</div>`);
        });
    </script>
</div>

</body>
</html>
